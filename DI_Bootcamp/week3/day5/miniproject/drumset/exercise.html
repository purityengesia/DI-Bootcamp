<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Drum Kit - Mini Project</title>
    
    <style>
        /* CSS STYLES */
        html {
            font-size: 10px;
            background: url('https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?auto=format&fit=crop&w=1350&q=80') bottom center;
            background-size: cover;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        .keys {
            display: flex;
            flex: 1;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
        }

        .key {
            border: .4rem solid #000;
            border-radius: .5rem;
            margin: 1rem;
            font-size: 1.5rem;
            padding: 1rem .5rem;
            transition: all .07s ease;
            width: 10rem;
            text-align: center;
            color: rgba(255, 255, 255, 0.589);
            background: rgba(0, 0, 0, 0.4);
            text-shadow: 0 0 .5rem rgb(0, 0, 0);
            cursor: pointer;
            user-select: none;
        }

        .playing {
            transform: scale(1.1);
            border-color: #ffc600;
            box-shadow: 0 0 1rem #ffc600;
        }

        kbd {
            display: block;
            font-size: 4rem;
        }

        .sound {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: .1rem;
            color: #ffc600;
        }
    </style>
</head>
<body>

    <div class="keys">
        <div data-key="65" class="key">
            <kbd>A</kbd>
            <span class="sound">clap</span>
        </div>
        <div data-key="83" class="key">
            <kbd>S</kbd>
            <span class="sound">hihat</span>
        </div>
        <div data-key="68" class="key">
            <kbd>D</kbd>
            <span class="sound">kick</span>
        </div>
        <div data-key="70" class="key">
            <kbd>F</kbd>
            <span class="sound">openhat</span>
        </div>
        <div data-key="71" class="key">
            <kbd>G</kbd>
            <span class="sound">boom</span>
        </div>
        <div data-key="72" class="key">
            <kbd>H</kbd>
            <span class="sound">ride</span>
        </div>
        <div data-key="74" class="key">
            <kbd>J</kbd>
            <span class="sound">snare</span>
        </div>
        <div data-key="75" class="key">
            <kbd>K</kbd>
            <span class="sound">tom</span>
        </div>
        <div data-key="76" class="key">
            <kbd>L</kbd>
            <span class="sound">tink</span>
        </div>
    </div>

    <audio data-key="65" src="sounds/clap.wav"></audio>
    <audio data-key="83" src="sounds/hihat.wav"></audio>
    <audio data-key="68" src="sounds/kick.wav"></audio>
    <audio data-key="70" src="sounds/openhat.wav"></audio>
    <audio data-key="71" src="sounds/boom.wav"></audio>
    <audio data-key="72" src="sounds/ride.wav"></audio>
    <audio data-key="74" src="sounds/snare.wav"></audio>
    <audio data-key="75" src="sounds/tom.wav"></audio>
    <audio data-key="76" src="sounds/tink.wav"></audio>

    <script>
        /* JAVASCRIPT LOGIC */

        function playSound(e) {
            // Determine if input came from Keyboard (e.keyCode) or Mouse (this.getAttribute)
            const keyCode = e.keyCode || this.getAttribute('data-key');
            
            const audio = document.querySelector(`audio[data-key="${keyCode}"]`);
            const key = document.querySelector(`.key[data-key="${keyCode}"]`);

            if (!audio) return; // Stop if no audio mapped to that key

            // Reset audio to start (allows for rapid hitting)
            audio.currentTime = 0;
            audio.play();

            // Visual feedback
            key.classList.add('playing');
        }

        function removeTransition(e) {
            // We only want to process the 'transform' transition
            if (e.propertyName !== 'transform') return;
            this.classList.remove('playing');
        }

        // Add event listeners to all keys for mouse clicks and transition ends
        const keys = document.querySelectorAll('.key');
        keys.forEach(key => {
            key.addEventListener('click', playSound);
            key.addEventListener('transitionend', removeTransition);
        });

        // Add event listener for keyboard presses
        window.addEventListener('keydown', playSound);

    </script>
</body>
</html>
