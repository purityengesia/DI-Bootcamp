<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip Calculator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #2c3e50;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #container {
            background: #fff;
            color: #333;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 350px;
        }
        h1 {
            background: #16a085;
            margin: -25px -25px 20px -25px;
            padding: 15px;
            text-align: center;
            font-size: 1.5rem;
            border-radius: 10px 10px 0 0;
        }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.1rem;
            cursor: pointer;
            text-transform: uppercase;
        }
        button:hover { background: #c0392b; }
        #totalTip {
            margin-top: 20px;
            text-align: center;
            font-size: 1.2rem;
        }
        #tip { font-weight: bold; font-size: 1.5rem; color: #e74c3c; }
        #each { font-size: 0.9rem; color: #7f8c8d; }
    </style>
</head>
<body>

    <div id="container">
        <h1>Tip Calculator</h1>
        
        <form>
            <label>How much was your bill?</label>
            <input type="number" id="billAmt" placeholder="Bill Amount">

            <label>How was your service?</label>
            <select id="serviceQual">
                <option disabled selected value="0">-- Choose an Option --</option>
                <option value="0.3">30% - Outstanding</option>
                <option value="0.2">20% - Good</option>
                <option value="0.15">15% - It was OK</option>
                <option value="0.1">10% - Bad</option>
                <option value="0.05">5% - Terrible</option>
            </select>

            <label>How many people are sharing the bill?</label>
            <input type="number" id="numOfPeople" placeholder="Number of People">

            <button type="button" id="calculate">Calculate!</button>
        </form>

        <div id="totalTip">
            <sup>$</sup><span id="tip">0.00</span>
            <small id="each">each</small>
        </div>
    </div>

    <script>
        // Second Part: Hide the totalTip div initially
        document.getElementById("totalTip").style.display = "none";

        function calculateTip() {
            // First Part: Fetch values
            const billAmount = document.getElementById("billAmt").value;
            const serviceQuality = document.getElementById("serviceQual").value;
            let numberOfPeople = document.getElementById("numOfPeople").value;

            // Condition: Check if billAmount is empty or serviceQuality is zero
            if (billAmount === "" || serviceQuality == 0) {
                alert("Please enter both the bill amount and service quality!");
                return; // Stop the function
            }

            // Condition: Validate number of people
            if (numberOfPeople === "" || numberOfPeople <= 1) {
                numberOfPeople = 1;
                // Hide the 'each' text
                document.getElementById("each").style.display = "none";
            } else {
                // Show the 'each' text
                document.getElementById("each").style.display = "inline";
            }

            // Calculation
            let total = (billAmount * serviceQuality) / numberOfPeople;
            
            // Round to two decimal points
            total = total.toFixed(2);

            // Display the result
            document.getElementById("totalTip").style.display = "block";
            document.getElementById("tip").innerHTML = total;
        }

        // Second Part: Call function on button click
        document.getElementById("calculate").onclick = function() {
            calculateTip();
        };
    </script>
</body>
</html>
