<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 1: Timer</title>
    <style>
        /* Provided Styles */
        p {
          background: yellow;
          color: red;
          padding: 10px;
          margin: 5px 0;
          border-radius: 4px;
          width: fit-content;
        }

        body {
            font-family: sans-serif;
            padding: 20px;
        }

        #container {
            margin-bottom: 20px;
            min-height: 50px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            background-color: #34495e;
            color: white;
            border: none;
            border-radius: 4px;
        }

        button:hover {
            background-color: #2c3e50;
        }
    </style>
</head>
<body>

    <div id="container"></div>
    <button id="clear">Clear Interval</button>

    <script>
        // --- Part I ---
        // Alert "Hello World" after 2 seconds
        setTimeout(function() {
            alert("Hello World");
        }, 2000);


        // --- Part II ---
        // Add one paragraph after 2 seconds
        setTimeout(addParagraph, 2000);


        // --- Part III ---
        const container = document.getElementById("container");
        const clearBtn = document.getElementById("clear");

        // Start the interval (runs every 2 seconds)
        // We store the ID in 'timer' so we can stop it later
        let timer = setInterval(addParagraph, 2000);

        /**
         * Function to create a <p> element and add it to the container.
         * It also checks if the count has reached 5 to stop the timer.
         */
        function addParagraph() {
            // Create the element
            const newP = document.createElement("p");
            newP.textContent = "Hello World";
            
            // Add it to the div
            container.appendChild(newP);

            // Check the number of paragraphs currently in the container
            const allParagraphs = container.querySelectorAll("p");
            
            if (allParagraphs.length >= 5) {
                console.log("Limit reached (5). Clearing interval...");
                clearInterval(timer);
            }
        }

        // Manual clear when the button is clicked
        clearBtn.addEventListener("click", function() {
            console.log("Button clicked. Clearing interval...");
            clearInterval(timer);
        });
    </script>

</body>
</html>
