<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 2: Form Handling</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 30px;
        }
        form {
            background-color: #f9f9f9;
            padding: 20px;
            border-radius: 5px;
            border: 1px solid #ddd;
            width: 300px;
        }
        .usersAnswer {
            margin-top: 20px;
            padding-left: 20px;
            color: #333;
        }
        li {
            margin-bottom: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <form id="userForm">
        <label for="fname">First name:</label><br>
        <input type="text" id="fname" name="firstname"><br>
        
        <label for="lname">Last name:</label><br>
        <input type="text" id="lname" name="lastname"><br><br>
        
        <input type="submit" value="Submit" id="submit">
    </form>

    <ul class="usersAnswer"></ul>

    <script>
        // 1. Retrieve the form and console.log it
        const form = document.querySelector('form');
        console.log("Form element:", form);

        // 2. Retrieve the inputs by their id and console.log them
        const fnameInput = document.getElementById('fname');
        const lnameInput = document.getElementById('lname');
        console.log("Inputs by ID:", fnameInput, lnameInput);

        // 3. Retrieve the inputs by their name attribute and console.log them
        const fnameByName = document.getElementsByName('firstname')[0];
        const lnameByName = document.getElementsByName('lastname')[0];
        console.log("Inputs by Name attribute:", fnameByName, lnameByName);

        // 4. Handle the submit event
        form.addEventListener('submit', function(event) {
            // Stop the page from refreshing (standard form behavior)
            event.preventDefault();

            // Get the values from the input tags
            const firstNameValue = fnameInput.value.trim();
            const lastNameValue = lnameInput.value.trim();

            // Make sure they are not empty
            if (firstNameValue === "" || lastNameValue === "") {
                alert("Please fill in both fields!");
                return; // Stop the function here
            }

            // Select the <ul> where answers will go
            const answerList = document.querySelector('.usersAnswer');

            // Clear previous answers (optional, but keeps it clean)
            answerList.innerHTML = '';

            // Create an <li> per input value
            const liFirst = document.createElement('li');
            liFirst.textContent = firstNameValue;

            const liLast = document.createElement('li');
            liLast.textContent = lastNameValue;

            // Append them to the <ul>
            answerList.appendChild(liFirst);
            answerList.appendChild(liLast);

            // Optional: Clear the inputs after successful submission
            fnameInput.value = '';
            lnameInput.value = '';
        });
    </script>

</body>
</html>
