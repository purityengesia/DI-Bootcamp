<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Quote Generator</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: auto; }
        section { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; text-align: center; }
        
        #quote-display { min-height: 100px; margin-bottom: 20px; }
        .quote-text { font-size: 1.5rem; font-style: italic; color: #2c3e50; }
        .quote-author { font-weight: bold; margin-top: 10px; color: #3498db; }
        
        button { padding: 10px 15px; margin: 5px; border: none; border-radius: 5px; cursor: pointer; transition: 0.3s; background: #3498db; color: white; }
        button:hover { background: #2980b9; }
        .btn-stats { background: #95a5a6; }
        .btn-like { background: #e74c3c; }
        
        form { background: #fff; padding: 20px; border-radius: 12px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .filter-controls { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Random Quote Generator</h1>

    <section id="display-area">
        <div id="quote-display">
            <p class="quote-text">Click the button to generate a quote!</p>
        </div>
        <button onclick="generateQuote()">Generate Quote</button>
        
        <div id="stats-buttons" style="display:none; margin-top: 20px;">
            <button class="btn-stats" onclick="getCharCount(true)">Chars (with spaces)</button>
            <button class="btn-stats" onclick="getCharCount(false)">Chars (no spaces)</button>
            <button class="btn-stats" onclick="getWordCount()">Word Count</button>
            <button class="btn-like" onclick="likeQuote()">Like ❤️ <span id="like-count">0</span></button>
        </div>
    </section>

    <section>
        <h3>Add Your Own Quote</h3>
        <form id="add-quote-form">
            <input type="text" id="new-quote" placeholder="Enter Quote Content" required>
            <input type="text" id="new-author" placeholder="Enter Author Name" required>
            <button type="button" onclick="addNewQuote()">Add Quote to Library</button>
        </form>
    </section>

    <section>
        <h3>Filter by Author</h3>
        <form id="filter-form">
            <input type="text" id="filter-author" placeholder="Type Author Name">
            <button type="button" onclick="filterByAuthor()">Filter Quotes</button>
        </form>
        
        <div id="filter-results" class="hidden">
            <div id="filtered-quote-display"></div>
            <div class="filter-controls">
                <button onclick="changeFilteredQuote(-1)">Previous</button>
                <button onclick="changeFilteredQuote(1)">Next</button>
            </div>
        </div>
    </section>
</div>

<script>
    // PART 1: Data Structure
    let quotes = [
        { id: 0, author: "Oscar Wilde", quote: "Be yourself; everyone else is already taken.", likes: 0 },
        { id: 1, author: "Albert Einstein", quote: "Two things are infinite: the universe and human stupidity.", likes: 0 },
        { id: 2, author: "Frank Zappa", quote: "So many books, so little time.", likes: 0 },
        { id: 3, author: "Marcus Aurelius", quote: "The happiness of your life depends upon the quality of your thoughts.", likes: 0 }
    ];

    let currentQuote = null;
    let lastQuoteId = -1;

    // PART 1: Generate Random Quote
    function generateQuote() {
        let randomIndex;
        
        // Ensure we don't pick the same quote twice in a row
        do {
            randomIndex = Math.floor(Math.random() * quotes.length);
        } while (randomIndex === lastQuoteId);

        currentQuote = quotes[randomIndex];
        lastQuoteId = randomIndex;

        displayQuote(currentQuote, 'quote-display');
        document.getElementById('stats-buttons').style.display = 'block';
        updateLikeDisplay();
    }

    function displayQuote(obj, elementId) {
        const target = document.getElementById(elementId);
        target.innerHTML = `
            <p class="quote-text">"${obj.quote}"</p>
            <p class="quote-author">— ${obj.author}</p>
        `;
    }

    // PART 2: Stats & Likes
    function getCharCount(withSpaces) {
        if (!currentQuote) return;
        const count = withSpaces ? currentQuote.quote.length : currentQuote.quote.replace(/\s/g, '').length;
        alert(`Character count: ${count}`);
    }

    function getWordCount() {
        if (!currentQuote) return;
        const count = currentQuote.quote.split(/\s+/).filter(word => word.length > 0).length;
        alert(`Word count: ${count}`);
    }

    function likeQuote() {
        if (!currentQuote) return;
        currentQuote.likes++;
        updateLikeDisplay();
    }

    function updateLikeDisplay() {
        document.getElementById('like-count').textContent = currentQuote.likes;
    }

    // PART 2: Add New Quote
    function addNewQuote() {
        const text = document.getElementById('new-quote').value;
        const auth = document.getElementById('new-author').value;

        if (text && auth) {
            const newObj = {
                id: quotes.length,
                author: auth,
                quote: text,
                likes: 0
            };
            quotes.push(newObj);
            alert("Quote added!");
            document.getElementById('add-quote-form').reset();
        }
    }

    // PART 3: Filter & Pagination
    let filteredList = [];
    let filterIndex = 0;

    function filterByAuthor() {
        const authorName = document.getElementById('filter-author').value.toLowerCase();
        filteredList = quotes.filter(q => q.author.toLowerCase().includes(authorName));
        
        if (filteredList.length > 0) {
            filterIndex = 0;
            document.getElementById('filter-results').style.display = 'block';
            displayFiltered();
        } else {
            alert("No quotes found for this author.");
            document.getElementById('filter-results').style.display = 'none';
        }
    }

    function displayFiltered() {
        displayQuote(filteredList[filterIndex], 'filtered-quote-display');
    }

    function changeFilteredQuote(direction) {
        filterIndex += direction;
        
        // Loop around if at start or end
        if (filterIndex >= filteredList.length) filterIndex = 0;
        if (filterIndex < 0) filterIndex = filteredList.length - 1;
        
        displayFiltered();
    }
</script>

</body>
</html>
