<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exercise 1: Input Form</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        form { max-width: 300px; display: flex; flex-direction: column; gap: 10px; }
        input[type="submit"] { cursor: pointer; background-color: #3498db; color: white; border: none; padding: 10px; }
    </style>
</head>
<body>
    <h2>User Submission Form</h2>
    <form action="display.html" method="GET">
        <label for="name">First Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="lastname">Last Name:</label>
        <input type="text" id="lastname" name="lastname" required>

        <input type="submit" value="Submit Data">
    </form>
</body>
</html>
