<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form to JSON String</title>
    <style>
        body { font-family: sans-serif; padding: 30px; line-height: 1.6; }
        form { max-width: 300px; margin-bottom: 20px; border: 1px solid #ddd; padding: 20px; border-radius: 8px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #2ecc71; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; width: 100%; }
        button:hover { background-color: #27ae60; }
        #output { background-color: #f4f4f4; padding: 15px; border-radius: 5px; font-family: monospace; word-break: break-all; }
    </style>
</head>
<body>

    <h2>Submit User Data</h2>
    
    <form id="userForm">
        <label for="fname">Name:</label>
        <input type="text" id="fname" name="name" required>

        <label for="lname">Last Name:</label>
        <input type="text" id="lname" name="lastname" required>

        <button type="submit">Send</button>
    </form>

    <h3>JSON Output:</h3>
    <div id="output">The result will appear here...</div>

    <script>
        const form = document.getElementById('userForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function(event) {
            // 1. Prevent the page from refreshing on submit
            event.preventDefault();

            // 2. Retrieve data using FormData
            const formData = new FormData(form);
            
            // 3. Convert FormData to a plain object
            const data = Object.fromEntries(formData.entries());

            // 4. Convert object to JSON string
            const jsonString = JSON.stringify(data);

            // 5. Append to the DOM
            output.textContent = jsonString;
            
            console.log("JSON generated:", jsonString);
        });
    </script>

</body>
</html>
