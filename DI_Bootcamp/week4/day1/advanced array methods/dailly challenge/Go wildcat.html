<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Info - Array Exercises</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; line-height: 1.6; background-color: #f4f4f9; }
        .container { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; }
        .task { margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .label { font-weight: bold; color: #3498db; display: block; margin-bottom: 5px; }
        .result { background: #2d3436; color: #55efc4; padding: 10px; border-radius: 5px; font-family: monospace; }
        .total-box { font-size: 1.2em; color: #e67e22; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Game Statistics</h1>

        <div class="task">
            <span class="label">Usernames with exclamation:</span>
            <div id="usernames-output" class="result"></div>
        </div>

        <div class="task">
            <span class="label">Winners (Score > 5):</span>
            <div id="winners-output" class="result"></div>
        </div>

        <div class="task">
            <span class="label">Total Score:</span>
            <div id="total-output" class="total-box"></div>
        </div>
    </div>

    <script>
        const gameInfo = [
            { username: "john", team: "red", score: 5, items: ["ball", "book", "pen"] },
            { username: "becky", team: "blue", score: 10, items: ["tape", "backpack", "pen"] },
            { username: "susy", team: "red", score: 55, items: ["ball", "eraser", "pen"] },
            { username: "tyson", team: "green", score: 1, items: ["book", "pen"] },
        ];

        // 1. Create array of usernames! using forEach
        const usernames = [];
        gameInfo.forEach(player => {
            usernames.push(player.username + "!");
        });
        document.getElementById('usernames-output').textContent = JSON.stringify(usernames);

        // 2. Create array of winners (score > 5) using forEach
        const winners = [];
        gameInfo.forEach(player => {
            if (player.score > 5) {
                winners.push(player.username);
            }
        });
        document.getElementById('winners-output').textContent = JSON.stringify(winners);

        // 3. Find and display total score
        let totalScore = 0;
        gameInfo.forEach(player => {
            totalScore += player.score;
        });
        document.getElementById('total-output').textContent = totalScore;

        // Log results to console for verification
        console.log("Usernames:", usernames);
        console.log("Winners:", winners);
        console.log("Total Score:", totalScore);
    </script>
</body>
</html>
