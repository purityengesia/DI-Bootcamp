<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Inventory - Find and Sort</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            padding: 20px;
            background-color: #f8f9fa;
            color: #333;
        }
        .container {
            max-width: 850px;
            margin: auto;
            background: white;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        h1 { text-align: center; color: #2c3e50; border-bottom: 3px solid #3498db; padding-bottom: 10px; }
        h2 { color: #2980b9; margin-top: 30px; font-size: 1.2rem; border-left: 5px solid #3498db; padding-left: 10px; }
        .instruction { font-style: italic; color: #636e72; margin-bottom: 10px; font-size: 0.9rem; }
        .output-box {
            background: #2d3436;
            color: #55efc4;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Consolas', 'Monaco', monospace;
            white-space: pre-wrap;
            margin: 10px 0;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
            font-size: 0.95rem;
        }
        code { background: #ffeaa7; padding: 2px 4px; border-radius: 3px; color: #d63031; }
        section { border-bottom: 1px solid #eee; padding-bottom: 20px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Car Inventory Assignment</h1>

        <section id="part-1">
            <h2>Part I: getCarHonda()</h2>
            <p class="instruction">Returns the first "Honda" found in the inventory as a formatted string.</p>
            <div id="honda-output" class="output-box"></div>
        </section>

        <section id="part-2">
            <h2>Part II: sortCarInventoryByYear()</h2>
            <p class="instruction">Returns the entire inventory sorted by <code>car_year</code> in ascending order.</p>
            <div id="sort-output" class="output-box"></div>
        </section>
    </div>

    <script>
        const inventory = [
            { id: 1, car_make: "Lincoln", car_model: "Navigator", car_year: 2009 },
            { id: 2, car_make: "Mazda", car_model: "Miata MX-5", car_year: 2001 },
            { id: 3, car_make: "Honda", car_model: "Accord", car_year: 1983 },
            { id: 4, car_make: "Land Rover", car_model: "Defender Ice Edition", car_year: 2010 },
            { id: 5, car_make: "Honda", car_model: "Accord", car_year: 1995 },
        ];

        /**
         * PART I: Find the first Honda
         * Uses .find() to get the first match.
         */
        function getCarHonda(carInventory) {
            const honda = carInventory.find(car => car.car_make === "Honda");
            
            if (honda) {
                return `This is a ${honda.car_make} ${honda.car_model} from ${honda.car_year}.`;
            }
            return "No Honda found in inventory.";
        }

        /**
         * PART II: Sort by Year
         * Uses .sort() to organize by year (Ascending).
         */
        function sortCarInventoryByYear(carInventory) {
            // We use the spread operator [...carInventory] to avoid mutating the original array
            return [...carInventory].sort((a, b) => a.car_year - b.car_year);
        }

        // --- Execute and Display ---
        
        // Output Part I
        const hondaResult = getCarHonda(inventory);
        document.getElementById('honda-output').innerText = hondaResult;
        console.log("Part I:", hondaResult);

        // Output Part II
        const sortedInventory = sortCarInventoryByYear(inventory);
        document.getElementById('sort-output').innerText = JSON.stringify(sortedInventory, null, 2);
        console.log("Part II (Sorted):", sortedInventory);

    </script>
</body>
</html>
