<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Wars API Project</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">

    <style>
        /* CSS STYLES */
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .app-container {
            background-color: #2c2c2c;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 350px;
            border: 2px solid #ffe300;
        }

        h1 {
            color: #ffe300;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 0;
        }

        #display-container {
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .info-card h2 {
            color: #ffe300;
            margin-bottom: 15px;
        }

        .info-card p {
            margin: 8px 0;
            font-size: 1.1rem;
        }

        #fetch-btn {
            background-color: #ffe300;
            color: #000;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        #fetch-btn:hover {
            background-color: #d4bd00;
            transform: scale(1.05);
        }

        /* Loading & Error Styling */
        .loading-msg {
            font-size: 1.5rem;
            color: #ffe300;
        }

        .error-msg {
            color: #ff4d4d;
        }

        .fa-spin-pulse, .fa-triangle-exclamation {
            font-size: 3rem;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>Star Wars</h1>
        
        <div id="display-container">
            <p>Ready to explore the galaxy?</p>
        </div>

        <button id="fetch-btn">Find Character</button>
    </div>

    <script>
        // JAVASCRIPT LOGIC
        
        // 1. Retrieve elements from the DOM
        const displayContainer = document.getElementById('display-container');
        const fetchBtn = document.getElementById('fetch-btn');

        // 2. Function to get data from the API
        async function getCharacterData() {
            // Show Loading Message
            displayContainer.innerHTML = `
                <div class="loading-msg">
                    <div class="fa-3x">
  \
  <i class="fa-solid fa-heart fa-beat" style="--fa-animation-duration: 0.5s;"></i>
</div>

                    <p>Loading...</p>
                </div>`;

            // The API has 83 characters
            const randomId = Math.floor(Math.random() * 83) + 1;

            try {
                const response = await fetch(`https://www.swapi.tech/api/people/${randomId}`);
                
                if (!response.ok) throw new Error("Character not found");

                const data = await response.json();
                const char = data.result.properties;

                // Homeworld is a URL, so we fetch it to get the name
                const worldResponse = await fetch(char.homeworld);
                const worldData = await worldResponse.json();
                const worldName = worldData.result.properties.name;

                // 3. Display the info
                renderCharacter(char, worldName);

            } catch (error) {
                renderError();
            }
        }

        function renderCharacter(char, world) {
            displayContainer.innerHTML = `
                <div class="info-card">
                    <h2>${char.name}</h2>
                    <p><strong>Height:</strong> ${char.height}</p>
                    <p><strong>Gender:</strong> ${char.gender}</p>
                    <p><strong>Birth Year:</strong> ${char.birth_year}</p>
                    <p><strong>Homeworld:</strong> ${world}</p>
                </div>
            `;
        }

        function renderError() {
            displayContainer.innerHTML = `
                <div class="error-msg">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                    <p>Oh No! That person isn't in the records.</p>
                </div>
            `;
        }

        // Add event listener to the button
        fetchBtn.addEventListener('click', getCharacterData);
    </script>
</body>
</html>
