<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Pokedex</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <style>
        body {
            background-color: #f0f0f0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .logo {
            max-width: 300px;
            margin-bottom: 20px;
        }

        /* Pokedex Container */
        .pokedex-body {
            background-color: #ff0000;
            border: 5px solid #333;
            border-radius: 20px;
            padding: 20px;
            width: 350px;
            box-shadow: 10px 10px 0px #880000;
        }

        /* Screen Area */
        #screen {
            background-color: #98cb98; /* Classic Gameboy Green */
            border: 10px solid #dedede;
            border-radius: 10px;
            height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            margin-bottom: 20px;
            padding: 10px;
            overflow: hidden;
        }

        #screen img {
            width: 120px;
            image-rendering: pixelated;
        }

        /* Controls */
        .controls {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .nav-btn {
            background-color: #333;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
        }

        #random-btn {
            background-color: #33a1ff;
            color: white;
            border: 4px solid #005bb5;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
        }

        .loading-icon {
            font-size: 3rem;
            color: #333;
        }

        .error-text {
            color: #721c24;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <img src="https://upload.wikimedia.org/wikipedia/commons/9/98/International_Pok%C3%A9mon_logo.svg" alt="Pokemon Logo" class="logo">

    <div class="pokedex-body">
        <div id="screen">
            <p>Press "Random" to start!</p>
        </div>

        <div class="controls">
            <button class="nav-btn" id="prev-btn"><i class="fa-solid fa-caret-left"></i></button>
            <button id="random-btn">RANDOM</button>
            <button class="nav-btn" id="next-btn"><i class="fa-solid fa-caret-right"></i></button>
        </div>
    </div>

    <script>
        // 1. Global State & DOM Elements
        let currentPokemonId = null;
        const screen = document.getElementById('screen');
        const randomBtn = document.getElementById('random-btn');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');

        // 2. Main Fetch Function
        async function fetchPokemon(id) {
            // Loading State
            screen.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin loading-icon"></i><p>Locating...</p>`;
            
            try {
                const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
                
                if (!response.ok) throw new Error();

                const data = await response.json();
                
                // Update global ID
                currentPokemonId = data.id;
                
                displayPokemon(data);
            } catch (error) {
                screen.innerHTML = `<p class="error-text">Oh no! That Pokemon isn't available...</p>`;
            }
        }

        // 3. Display Logic
        function displayPokemon(poke) {
            const name = poke.name.toUpperCase();
            const type = poke.types.map(t => t.type.name).join(' / ');
            
            screen.innerHTML = `
                <img src="${poke.sprites.front_default}" alt="${name}">
                <h3>${name} (ID: ${poke.id})</h3>
                <p>Type: ${type}</p>
                <p>HT: ${poke.height / 10}m | WT: ${poke.weight / 10}kg</p>
            `;
        }

        // 4. Button Event Listeners
        
        // Random: Pick a random ID between 1 and 1025
        randomBtn.addEventListener('click', () => {
            const randomId = Math.floor(Math.random() * 1025) + 1;
            fetchPokemon(randomId);
        });

        // Next
        nextBtn.addEventListener('click', () => {
            if (currentPokemonId) {
                fetchPokemon(currentPokemonId + 1);
            }
        });

        // Previous
        prevBtn.addEventListener('click', () => {
            if (currentPokemonId && currentPokemonId > 1) {
                fetchPokemon(currentPokemonId - 1);
            }
        });

    </script>
</body>
</html>
